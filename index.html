    body {

      color: white;

      overflow-x: hidden;

    /* ═══════════════════════════════════════
       GALAXY BACKGROUND
    ═══════════════════════════════════════ */
    #galaxy {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Deep space gradient layers */
    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 50% 80%, rgba(60,0,80,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }

    /* Nebula color blobs */
    #galaxy::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 15% 25%, rgba(140,0,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 35% 25% at 85% 60%, rgba(0,80,200,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 50% 20% at 60% 10%, rgba(200,50,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 40% at 30% 80%, rgba(80,0,180,0.15) 0%, transparent 70%);
      animation: nebulaPulse 12s ease-in-out infinite alternate;
    }
    @keyframes nebulaPulse {
      0%   { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* Star canvas layers via box-shadow */
    .star-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .star-layer::after { content: ''; position: absolute; border-radius: 50%; }

    #stars-sm::after {
      width: 1px; height: 1px; background: transparent;
      box-shadow:
        45px 120px #fff, 110px 34px #fff, 178px 210px #fff, 230px 80px #fff,
        290px 155px #fff, 350px 40px #fff, 420px 190px #fff, 480px 95px #fff,
        540px 260px #fff, 600px 15px #fff, 660px 140px #fff, 720px 220px #fff,
        780px 70px #fff, 840px 180px #fff, 900px 50px #fff, 960px 230px #fff,
        1020px 110px #fff, 1080px 290px #fff, 1140px 30px #fff, 1200px 160px #fff,
        1260px 240px #fff, 1320px 85px #fff, 1380px 200px #fff, 60px 340px #fff,
        130px 420px #fff, 195px 510px #fff, 255px 380px #fff, 315px 460px #fff,
        375px 540px #fff, 435px 400px #fff, 495px 480px #fff, 555px 360px #fff,
        615px 440px #fff, 675px 520px #fff, 735px 390px #fff, 795px 470px #fff,
        855px 550px #fff, 915px 410px #fff, 975px 490px #fff, 1035px 370px #fff,
        1095px 450px #fff, 1155px 530px #fff, 1215px 420px #fff, 1275px 500px #fff,
        80px 600px #fff, 150px 680px #fff, 220px 750px #fff, 280px 630px #fff,
        340px 710px #fff, 400px 790px #fff, 460px 660px #fff, 520px 730px #fff,
        580px 810px #fff, 640px 670px #fff, 700px 740px #fff, 760px 820px #fff,
        820px 690px #fff, 880px 760px #fff, 940px 840px #fff, 1000px 700px #fff,
        1060px 770px #fff, 1120px 850px #fff, 1180px 720px #fff, 1240px 800px #fff,
        25px 900px #fff, 95px 970px #fff, 165px 920px #fff, 235px 990px #fff,
        305px 880px #fff, 375px 950px #fff, 445px 910px #fff, 515px 980px #fff,
        585px 870px #fff, 655px 940px #fff, 725px 1000px #fff, 795px 890px #fff,
        865px 960px #fff, 935px 930px #fff, 1005px 1010px #fff, 1075px 880px #fff;
      animation: twinkle1 3s infinite alternate;
    }
    @keyframes twinkle1 { from { opacity:0.3; } to { opacity:1; } }

    #stars-md::after {

      box-shadow:

    }
    @keyframes twinkle2 { from { opacity:0.4; } to { opacity:1; } }

    #stars-lg::after {
      width: 3px; height: 3px; background: transparent;
      box-shadow:

    /* Shooting stars */
    .shoot {
      position: absolute;
      width: 3px;
      height: 120px;
      background: linear-gradient(rgba(255,255,255,0.9), transparent);
      transform: rotate(45deg);
      border-radius: 2px;
      animation: shooting linear infinite;
      opacity: 0;
    }
    .shoot:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
    .shoot:nth-child(2) { left: 35%; animation-duration: 10s; animation-delay: 3s; }
    .shoot:nth-child(3) { left: 60%; animation-duration: 7s; animation-delay: 6s; }
    .shoot:nth-child(4) { left: 80%; animation-duration: 9s; animation-delay: 1.5s; }
    @keyframes shooting {
      0%   { top: -10%; opacity: 0; }
      5%   { opacity: 1; }
      40%  { top: 110%; opacity: 0; }
      100% { top: 110%; opacity: 0; }
    }

    #search-wrap {

    #search-input {

      border: 2px solid rgba(180,100,255,0.45);
      border-radius: 30px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 14px 24px 14px 52px;
      width: 280px;
      outline: none;
      transition: 0.3s;
      backdrop-filter: blur(8px);
    }
    #search-input::placeholder { color: rgba(255,255,255,0.4); font-weight: normal; }
    #search-input:focus {
      width: 340px;
      border-color: rgba(200,150,255,0.8);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 20px rgba(160,80,255,0.4);
    }
    #search-icon {

      transform: translateY(-50%);

      pointer-events: none;

    /* ═══════════════════════════════════════

      position: relative;
      z-index: 10;
      max-width: 1400px;

    .game-card.hidden { display: none; }

    .game-btn {
      padding: 22px 70px;

      border: none;
      border-radius: 15px;
      background: #1e293b;
      color: white;

      font-size: 24px;
      color: rgba(255,255,255,0.4);
      margin: 70px 0;
      position: relative;
      z-index: 10;
    }
  </style>

  <script>
    // ── OPEN GAME — simple new tab, no fetch (fixes 404) ──
    function openGame(file) {
      window.open(file, '_blank');
    }

    // ── CLOCK ──
    function updateClock() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerText =
        (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── BACK BUTTON RELOAD ──
    window.onpageshow = function(e) { if (e.persisted) window.location.reload(); };

    // ── SEARCH ──
    var cards = document.querySelectorAll('.game-card');
    var countEl = document.getElementById('game-count');
    var noResults = document.getElementById('no-results');
    countEl.textContent = cards.length + ' GAMES';

    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      var visible = 0;
      cards.forEach(function(c) {
        var match = !q || c.getAttribute('data-name').toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
      countEl.textContent = q
        ? visible + ' GAME' + (visible !== 1 ? 'S' : '') + ' FOUND'
        : cards.length + ' GAMES';
    });
  </script>
