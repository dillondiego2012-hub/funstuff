    /* dark overlay so buttons/text stay readable */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(5, 0, 20, 0.45);
      pointer-events: none;
      z-index: 0;
    }

    .shooting-star {
      position: fixed;
      top: -50px;
      width: 2px;
      height: 100px;
      background: linear-gradient(white, transparent);
      transform: rotate(45deg);
      animation: shoot 6s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes shoot {
      0%   { top: -50px; left: 10%; opacity: 1; }
      100% { top: 100%;  left: 80%; opacity: 0; }
    }

    /* ── TOP NAV ── */
    #top-nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px 0;
      width: 100%;
    }

    #request-link {
      font-size: 15px;
      color: #a8d8f0;
      text-decoration: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 8px 18px;
      transition: 0.25s;
      white-space: nowrap;
    }
    #request-link:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
      box-shadow: 0 0 12px rgba(100,200,255,0.3);
    }

    #search-wrap { position: relative; }
    #search-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      color: #fff;
      font-size: 15px;
      padding: 9px 18px 9px 40px;
      width: 210px;
      outline: none;
      transition: 0.3s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.4); }
    #search-input:focus {
      width: 250px;
      border-color: rgba(100,200,255,0.6);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 14px rgba(100,200,255,0.2);
    }
    #search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    /* ── HEADER ── */
    #header {
      position: relative;
      z-index: 10;
      margin-top: 16px;
    }
    h1 { font-size: 48px; margin: 0 0 10px; text-shadow: 0 2px 12px rgba(0,0,0,0.8); }
    #clock { font-size: 40px; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
    #game-count {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    /* ── GAMES GRID ── */
    .games-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 24px 60px;
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    .game-card.hidden { display: none; }

    .game-btn {
      padding: 22px 70px;
      font-size: 28px;
      border: none;
      border-radius: 15px;
      background: rgba(30, 41, 59, 0.82);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.15);
      transition: 0.3s;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }
    .game-btn:hover {
      background: rgba(51, 65, 85, 0.92);
      transform: scale(1.12);
      box-shadow: 0 0 30px rgba(255,255,255,0.5);
    }

    #no-results {
      display: none;
      font-size: 22px;
      color: rgba(255,255,255,0.4);
      margin: 60px 0;
      position: relative;
      z-index: 10;
    }
  </style>

    var gameFiles = {
      lol:'cl1v1lol.html', dash3:'cl3dash.html', smallworldcup:'clasmallworldcup.html',

      baseballbros:'clbaseballbros.html', basketbros:'clbasketbros.html',
      basketballstars:'clbasketballstars.html', bitplanes:'clbitplanes.html',
      bitlife:'clbitlife.html', blockblast:'clblockblastv2.html',
      clusterrush:'clclusterrush.html', cookieclicker:'clcookieclicker.html',
      coreball:'clcoreball.html', crazycattle:'clcrazycattle3d.html',
      crossyroad:'clcrossyroad.html', driftboss:'cldriftboss.html',
      drifthunters:'cldrifthuntersmerge.html', drivemad:'cldrivemady.html',
      escaperoad2:'clescaperoad-2.html', escaperoadcity2:'clescaperoadcity2.html',
      fnaf1:'clFNAF.html', fnaf2:'clFNAF2.html', fnaf3:'clFNAF3.html', fnaf4:'clFNAF4.html',
      footballbros:'clfootballbros.html', gdsubzero:'clgdsubzero.html',
      gdworld:'clGeometryDashWorld.html', gdlite:'clgdlite.html',
      getawayshootout:'clgetawayshootout.html', granny2:'clgranny22.html',
      granny3:'clgranny3.html', grannyoriginal:'clgrannyy.html', gunspin:'clgunspin.html',
      karatebros:'clkaratebros.html', kartbros:'clkartbros.html',
      learntofly:'cllearntofly.html', leveldevil:'clleveldevil.html',
      monkeymart:'clmonkeymart.html', motox3m:'clmotox3mm.html', ovo:'clovofixed.html',
      pizzatower:'clpizzatower.html', polytrack:'clpolytrackworksnow.html',
      retrobowl:'clretrobowl.html', retrobowlcollege:'clretrobowlcollege.html',
      rocketleague:'clrocketleague.html', rooftopsnipers2:'clrooftopsnipers2.html',
      run3:'clrun3.html', slopeplus:'clslopeplus.html', snowrider:'clsnowrider.html',
      soccerbros:'clsoccerbros.html', soccerrandom:'clsoccerrandomgood.html',
      spacewaves:'clspacewaves.html', subwaysurfers:'clsubwaysurfershouston.html',
      superliquidsoccer:'clsuperliquidsoccer.html', survivalrace:'clcarkingarena.html',
      tinyfishing:'cltinyfishing.html', tunnelrush:'cltunnelrushbetter.html',
      wrestlebros:'clwrestlebros.html'
    };

    function openGame(key) {
      var file = gameFiles[key];
      if (!file) return;
      var win = window.open('', '_blank');
      var xhr = new XMLHttpRequest();
      xhr.open('GET', file, true);
      xhr.onload = function() {
        if (xhr.status === 200) { win.document.open(); win.document.write(xhr.responseText); win.document.close(); }
        else { win.location.href = file; }
      };
      xhr.onerror = function() { win.location.href = file; };
      xhr.send();
    }

    function updateClock() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerText =
        (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    window.onpageshow = function(e) { if (e.persisted) window.location.reload(); };

    var cards = document.querySelectorAll('.game-card');
    var countEl = document.getElementById('game-count');
    var noResults = document.getElementById('no-results');
    countEl.textContent = cards.length + ' GAMES';

    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      var visible = 0;
      cards.forEach(function(c) {
        var match = !q || c.getAttribute('data-name').toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
      countEl.textContent = q ? visible + ' GAME' + (visible !== 1 ? 'S' : '') + ' FOUND' : cards.length + ' GAMES';
    });
  </script>
