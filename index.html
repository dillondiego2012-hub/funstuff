    #galaxy { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),

        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }
    #galaxy::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 15% 25%, rgba(140,0,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 35% 25% at 85% 60%, rgba(0,80,200,0.2) 0%, transparent 70%),

      animation: nebulaPulse 12s ease-in-out infinite alternate;
    }
    @keyframes nebulaPulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: white; border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

  <script>
    function generateStars() {
      var galaxy = document.getElementById('galaxy');
      for (var i = 0; i < 150; i++) {
        var star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        galaxy.appendChild(star);
      }
    }
    generateStars();

    function openGame(file) {
      var win = window.open('about:blank', '_blank');
      if (file.startsWith('http')) { win.location.href = file; return; }
      fetch(file)
        .then(function(r) { return r.text(); })
        .then(function(html) {
          win.document.open();
          win.document.write(html);
          win.document.close();
        })
        .catch(function() { win.location.href = file; });
    }

    function goHome() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById('search-input').value = '';
      document.querySelectorAll('.game-card').forEach(function(c) { c.classList.remove('hidden'); });
      document.getElementById('game-count').textContent = document.querySelectorAll('.game-card').length + ' GAMES';
      document.getElementById('no-results').style.display = 'none';
    }

    function updateClock() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerText =
        (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();

    window.onpageshow = function(e) { if (e.persisted) window.location.reload(); };

    var cards = document.querySelectorAll('.game-card');
    var countEl = document.getElementById('game-count');
    var noResults = document.getElementById('no-results');
    countEl.textContent = cards.length + ' GAMES';
    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      var visible = 0;
      cards.forEach(function(c) {
        var match = !q || c.getAttribute('data-name').toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
      countEl.textContent = q ? visible + ' GAME' + (visible !== 1 ? 'S' : '') + ' FOUND' : cards.length + ' GAMES';
    });
  </script>
