<!DOCTYPE html>
<html>
<head>
  <title>Diegos/Tommys-Games</title>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
    }
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    .stars::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      box-shadow:
        100px 200px white,
        300px 400px white,
        500px 100px white,
        700px 300px white,
        900px 200px white,
        1100px 400px white,
        1300px 150px white;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }
    .shooting-star {
      position: absolute;
      top: -50px;
      width: 2px;
      height: 100px;
      background: linear-gradient(white, transparent);
      transform: rotate(45deg);
      animation: shoot 6s linear infinite;
    }
    @keyframes shoot {
      0% { top: -50px; left: 10%; opacity: 1; }
      100% { top: 100%; left: 80%; opacity: 0; }
    }
    .container {
      z-index: 1;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    #clock {
      font-size: 40px;
      margin-bottom: 40px;
    }
    .games-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .game-btn {
      padding: 22px 70px;
      font-size: 28px;
      border: none;
      border-radius: 15px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      transition: 0.3s;
    }
    .game-btn:hover {
      background: #334155;
      transform: scale(1.12);
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="shooting-star"></div>
  <div class="container">
    <h1>🎮 Diego/Tommys Games</h1>
    <div id="clock"></div>
    <div class="games-grid">
      <button class="game-btn" onclick="openGame('gunSpin')">🔫 Gun Spin</button>
    </div>
  </div>

  <script>
    const games = {
      gunSpin: `
        <!DOCTYPE html>
        <html lang="en-us">
          <head>
            <meta charset="utf-8">
            <title>Gun Spin</title>
            <base href="https://cdn.jsdelivr.net/gh/bubbls/gunspin/">
            <link rel="stylesheet" href="TemplateData/style.css">
            <script src="TemplateData/UnityProgress.js"><\/script>
            <script src="Build/UnityLoader.js"><\/script>
            <script>
              window.gameInstance = UnityLoader.instantiate("unityContainer", "Build/GunSpin%20WebGL%20FinalVersion.json");
            <\/script>
            <style>
              * { margin: 0; padding: 0; }
              body { background: black; overflow: hidden; }
              div#unityContainer {
                position: absolute !important;
                left: 50%; top: 50%;
                transform: translate(-50%, -50%);
                width: 150vh !important;
                height: 100vh !important;
              }
              .footer { display: none; }
            </style>
          </head>
          <body>
            <div class="webgl-content">
              <div id="unityContainer"></div>
              <div class="footer">
                <div class="webgl-logo"></div>
                <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
                <div class="title">GunSpin</div>
              </div>
            </div>
          </body>
        </html>
      `
    };

    function openGame(key) {
      const win = window.open('', '_blank');
      win.document.open();
      win.document.write(games[key]);
      win.document.close();
    }

    // Force reload on back button
    window.onpageshow = function(event) {
      if (event.persisted) window.location.reload();
    };

    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes();
      let s = now.getSeconds();
      let ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      h = h < 10 ? '0' + h : h;
      m = m < 10 ? '0' + m : m;
      s = s < 10 ? '0' + s : s;
      document.getElementById("clock").innerText = h + ":" + m + ":" + s + " " + ampm;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
