<!DOCTYPE html>
<html>
<head>
  <title>Diego/Tommys-Games</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    /* TITLE AT TOP */
    h1 {
      margin-top: 20px;
      font-size: 40px;
    }

    /* CLOCK */
    #clock {
      font-size: 35px;
      margin-top: 10px;
      margin-bottom: 30px;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #334155;
    }

    /* SEARCH */
    .search-box {
      width: 80%;
      height: 500px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <h1>🎮 Diego/Tommys Games</h1>

  <div id="clock"></div>

  <div class="buttons">
    <button onclick="location.href='games.html'">🎮 Games</button>
    <button onclick="location.href='movies.html'">🎬 Movies</button>
  </div>


  <script
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes();
      let s = now.getSeconds();
      let ampm = h >= 12 ? 'PM' : 'AM';

      h = h % 12;
      h = h ? h : 12;

      h = h < 10 ? '0' + h : h;
      m = m < 10 ? '0' + m : m;
      s = s < 10 ? '0' + s : s;

      document.getElementById("clock").innerText =
        h + ":" + m + ":" + s + " " + ampm;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
