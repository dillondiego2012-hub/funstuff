<!DOCTYPE html>
<html>
<head>
  <title>Diego/Tommys Games</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;

      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
    }

    /* SMALL TWINKLING STARS */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .stars::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      box-shadow:
        100px 200px white,
        300px 400px white,
        500px 100px white,
        700px 300px white,
        900px 200px white,
        1100px 400px white,
        1300px 150px white;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    /* SHOOTING STAR */
    .shooting-star {
      position: absolute;
      top: -50px;
      width: 2px;
      height: 100px;
      background: linear-gradient(white, transparent);
      transform: rotate(45deg);
      animation: shoot 6s linear infinite;
    }

    @keyframes shoot {
      0% {
        top: -50px;
        left: 10%;
        opacity: 1;
      }
      100% {
        top: 100%;
        left: 80%;
        opacity: 0;
      }
    }

    .container {
      z-index: 1;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    #clock {
      font-size: 40px;
      margin-bottom: 40px;
    }

    /* BUTTON */
    .game-btn {
      padding: 22px 70px;
      font-size: 28px;
      border: none;
      border-radius: 15px;
      background: #1e293b;
      color: white;
      cursor: pointer;

      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .game-btn:hover {
      background: #334155;
      transform: scale(1.12);
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

  <div class="stars"></div>
  <div class="shooting-star"></div>

  <div class="container">
    <h1>🎮 Diego/Tommys Games</h1>

    <div id="clock"></div>

    <button class="game-btn" onclick="location.href='games.html'">
      🚀 PLAY GAMES
    </button>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes();
      let s = now.getSeconds();
      let ampm = h >= 12 ? 'PM' : 'AM';

      h = h % 12;
      h = h ? h : 12;

      h = h < 10 ? '0' + h : h;
      m = m < 10 ? '0' + m : m;
      s = s < 10 ? '0' + s : s;

      document.getElementById("clock").innerText =
        h + ":" + m + ":" + s + " " + ampm;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
