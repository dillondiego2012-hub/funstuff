<!DOCTYPE html>
<html>
<head>
  <title>Diego/Tommys Games</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;

      /* CENTER EVERYTHING */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    #clock {
      font-size: 36px;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #334155;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎮 Diego/Tommys Games</h1>

    <div id="clock"></div>

    <div class="buttons">
      <button onclick="location.href='games.html'">🎮 Games</button>
       </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes();
      let s = now.getSeconds();
      let ampm = h >= 12 ? 'PM' : 'AM';

      h = h % 12;
      h = h ? h : 12;

      h = h < 10 ? '0' + h : h;
      m = m < 10 ? '0' + m : m;
      s = s < 10 ? '0' + s : s;

      document.getElementById("clock").innerText =
        h + ":" + m + ":" + s + " " + ampm;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
