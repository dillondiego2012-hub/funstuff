  <script>
    // SMART Search Function
    function filterModules() {
      const input = document.getElementById('search-input');
      const filter = input.value.toLowerCase();
      const buttons = document.getElementsByClassName('lecture-btn');

      for (let i = 0; i < buttons.length; i++) {
        const mathName = buttons[i].textContent.toLowerCase();
        const secretTags = buttons[i].getAttribute('data-tags').toLowerCase();
        
        // Searches BOTH the visible math name AND the hidden secret tags
        if (mathName.includes(filter) || secretTags.includes(filter)) {
          buttons[i].classList.remove('hidden');
        } else {
          buttons[i].classList.add('hidden');
        }
      }
    }

    // Star generator
    const galaxy = document.getElementById('galaxy');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 'px';
      star.style.width = size;
      star.style.height = size;
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
      galaxy.appendChild(star);
    }

    // Stealth Loader
    function openModule(file) {
      const win = window.open('about:blank', '_blank');
      fetch(file)
        .then(r => r.text())
        .then(html => {
          win.document.open();
          win.document.write(html);
          win.document.close();
        })
        .catch(() => { win.location.href = file; });
    }
  </script>
