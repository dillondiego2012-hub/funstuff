  <title>STAAR Mathematics Review Directory</title>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      background: #0a0015;
    }
    #galaxy { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 50% 80%, rgba(60,0,80,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: white; border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

    #header { position: relative; z-index: 10; padding-top: 40px; }
    h1 { font-size: 42px; text-shadow: 0 0 20px rgba(180,100,255,0.7); margin-bottom: 10px; }
    #clock { font-size: 32px; color: rgba(255,255,255,0.8); margin-bottom: 20px; }

    .lectures-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 15px; padding: 20px;
      position: relative; z-index: 10;
      max-width: 1200px; margin: 0 auto;
    }
    .lecture-card { width: 280px; }
    .lecture-btn {
      width: 100%; padding: 20px; font-size: 18px; border: 1px solid rgba(180,100,255,0.3);
      border-radius: 12px; background: rgba(30, 41, 59, 0.8); color: white;
      cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
    }
    .lecture-btn:hover {
      background: rgba(51, 65, 85, 0.9); transform: scale(1.05);
      box-shadow: 0 0 20px rgba(180,100,255,0.5);
      border-color: rgba(180,100,255,0.8);
    }
  </style>
</head>
<body>

  <div id="galaxy"></div>

  <div id="header">
    <h1>📐 Curriculum Component Hub</h1>
