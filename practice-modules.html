  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      background: #0a0015;
    }

    /* GALAXY BACKGROUND */
    #galaxy {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

    /* NAVIGATION & SEARCH */
    #top-nav {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: flex-end; 
      padding: 24px 36px 0;
    }

    #search-input {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(180,100,255,0.45);
      border-radius: 30px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 14px 28px;
      width: 300px;
      outline: none;
      transition: 0.3s;
      backdrop-filter: blur(8px);
    }
    #search-input:focus {
      width: 360px;
      border-color: rgba(200,150,255,0.8);
      box-shadow: 0 0 20px rgba(160,80,255,0.4);
    }

    /* HEADER */
    #header { position: relative; z-index: 10; margin-top: 10px; }
    #save-reminder { font-size: 30px; margin-bottom: 6px; color: rgba(255,255,255,0.75); text-shadow: 0 0 15px rgba(180,100,255,0.5); }
    h1 { font-size: 52px; margin: 0 0 10px; text-shadow: 0 0 30px rgba(180,100,255,0.7); cursor: pointer; }
    #clock { font-size: 40px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(180,100,255,0.5); }
    #module-count { font-size: 14px; color: rgba(200,170,255,0.5); letter-spacing: 3px; margin-bottom: 30px; }

    /* CLEAN GRID STYLE */
    .modules-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 24px 70px;
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    .module-card.hidden { display: none; }

    .module-btn {
      width: 350px;
      padding: 22px 15px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 15px;
      background: #1e293b; /* Solid Navy Blue */
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      transition: 0.3s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-btn:hover {
      background: #334155;
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(255,255,255,0.25);
    }

    #no-results { display: none; font-size: 24px; color: rgba(255,255,255,0.4); margin: 70px 0; z-index: 10; }
  </style>

  <script>
    function generateStars() {
      const galaxy = document.getElementById('galaxy');
      for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        galaxy.appendChild(star);
      }
    }
    generateStars();

    function openModule(file) {
      const win = window.open('about:blank', '_blank');
      fetch(file).then(r => r.text()).then(html => {
        win.document.open();
        win.document.write(html);
        win.document.close();
      }).catch(() => win.location.href = file);
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const cards = document.querySelectorAll('.module-card');
    document.getElementById('module-count').textContent = `${cards.length} MODULES LOADED`;

    document.getElementById('search-input').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      let visible = 0;
      cards.forEach(c => {
        const match = c.innerText.toLowerCase().includes(q) || c.dataset.name.toLowerCase().includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('module-count').textContent = `${visible} MODULES LOADED`;
    });
  </script>
