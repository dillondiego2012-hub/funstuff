    /* ═══════════════════════════════════════
       GALAXY BACKGROUND
    ═══════════════════════════════════════ */
    #galaxy {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #galaxy::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,120,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,30,100,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0025 0%, #020008 100%);
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.3; }
      to   { opacity: 1; }
    }

      padding: 20px 40px;

    }

    .nav-links { display: flex; gap: 15px; }

      padding: 10px 20px;
      transition: 0.3s;

    #request-link:hover {
      background: rgba(120,0,255,0.3);
